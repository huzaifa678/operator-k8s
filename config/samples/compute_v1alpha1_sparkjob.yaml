apiVersion: compute.compute.example.com/v1alpha1
kind: SparkJob
metadata:
  name: elt-articles-pipeline
  labels:
    pipeline: articles
    stage: transform
spec:
  # Python ELT job: ingests raw orders CSV from S3, cleans/casts, writes Parquet partitioned by date.
  type: Python
  # Custom image with hadoop-aws + aws-java-sdk-bundle baked in.
  # Build + import with: `make spark-image`. See cluster/spark/Dockerfile.
  image: compute-operator/spark-s3:3.5.3
  mainApplicationFile: s3a://spark-lake-2998043/jobs/elt_articles.py

  # Auto-tune executor count based on input size (500 MB raw CSV).
  minExecutors: 2
  maxExecutors: 10
  resourceHint:
    inputSizeMB: 500
    costPerHourUSD: "0.12"

  driverResources:
    requests:
      cpu: "500m"
      memory: "1Gi"
    limits:
      memory: "2Gi"

  executorResources:
    requests:
      cpu: "1"
      memory: "2Gi"
    limits:
      memory: "4Gi"

  # No --date: elt_articles.py defaults to today (UTC) and reads raw/articles/YYYY/MM/DD/.
  # No --partition-by: defaults to published_date (the schema is articles now;
  # see jobs/elt_articles.py header). Override with spec.schedule for daily runs.
  arguments:
    - "--source-base"
    - "s3a://spark-lake-2998043/raw/articles/"
    - "--dest-path"
    - "s3a://spark-lake-2998043/processed/articles/"

  # See scrape sample for the aws-creds Secret creation command.
  envFrom:
    - secretRef:
        name: aws-creds

  sparkConf:
    # S3A committer for atomic Parquet writes (no rename dance).
    spark.hadoop.fs.s3a.impl: org.apache.hadoop.fs.s3a.S3AFileSystem
    # envFrom: aws-creds (above) is auto-propagated to executor pods by the
    # controller — no executor.secretKeyRef.* lines required here.
    spark.hadoop.fs.s3a.aws.credentials.provider: com.amazonaws.auth.EnvironmentVariableCredentialsProvider
    spark.hadoop.fs.s3a.committer.name: magic
    spark.sql.sources.commitProtocolClass: org.apache.spark.internal.io.cloud.PathOutputCommitProtocol
    spark.sql.parquet.output.committer.class: org.apache.spark.internal.io.cloud.BindingParquetOutputCommitter

    # Enable adaptive query execution for skewed joins in order data.
    spark.sql.adaptive.enabled: "true"
    spark.sql.adaptive.skewJoin.enabled: "true"

    # Write Parquet with Snappy compression.
    spark.sql.parquet.compression.codec: snappy

    # Kubernetes pod labels for observability.
    spark.kubernetes.driver.label.pipeline: articles
    spark.kubernetes.executor.label.pipeline: articles

  # Run on spot to cut cost; retry up to 3× on preemption.
  spot:
    enabled: true
    maxRetries: 3

  # Checkpoint every 30 min so a spot eviction doesn't lose all progress.
  checkpoint:
    enabled: true
    s3URI: s3a://spark-lake-2998043/checkpoints/elt-articles-pipeline/
    credentialsSecret: spark-s3-credentials
    interval: "30m"
