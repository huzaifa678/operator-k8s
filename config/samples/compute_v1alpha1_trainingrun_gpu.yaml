# GPU variant of the articles BERT fine-tune.
# Requires:
#   1. A real cluster with NVIDIA GPU nodes (k3d has none).
#   2. The NVIDIA GPU Operator installed:    make install-gpu-operator
#   3. The articles-processed-pvc PVC populated by elt-orders-pipeline.
apiVersion: compute.compute.example.com/v1alpha1
kind: TrainingRun
metadata:
  name: bert-finetune-articles-gpu
  labels:
    pipeline: articles
    stage: train
spec:
  framework: PyTorch
  image: pytorch/pytorch:2.5.1-cuda12.4-cudnn9-runtime
  worldSize: 2
  gpu:
    enabled: true
    perWorker: 1
    runtimeClass: nvidia
    backend: nccl
  workerResources:
    requests: { cpu: "2", memory: "8Gi" }
    limits:   { memory: "16Gi" }
  packages:
    - transformers==4.44.2
    - pandas==2.2.2
    - pyarrow==17.0.0
  datasetPVC: articles-processed-pvc
  resourceHint:
    costPerHourUSD: "2.50"
  spot:
    enabled: true
    mode: Preferred
    maxRetries: 3
  # Same controller built-in as the CPU variant. The script auto-detects CUDA
  # and switches to ModernBERT-base + nccl + larger batch size when GPUs are
  # visible — no script-level changes needed.
  builtinTrainer: BERTClassifier
  env:
    - { name: PYTHONUNBUFFERED,       value: "1" }
    - { name: TRANSFORMERS_VERBOSITY, value: "error" }
    - { name: NCCL_DEBUG,             value: "WARN" }
    - { name: TEXT_COLUMN,        value: "title" }
    - { name: LABEL_COLUMN,       value: "source" }
    - { name: DATA_PARQUET_GLOB,  value: "/data/published_date=*/*.parquet" }
