apiVersion: compute.compute.example.com/v1alpha1
kind: TrainingRun
metadata:
  name: bert-finetune-articles
  labels:
    pipeline: articles
    stage: train
spec:
  framework: PyTorch
  image: pytorch/pytorch:2.5.1-cuda12.4-cudnn9-runtime
  worldSize: 2
  workerResources:
    requests: { cpu: "500m", memory: "2Gi" }
    limits:   { memory: "4Gi" }
  packages:
    - transformers==4.44.2
    - pandas==2.2.2
    - pyarrow==17.0.0       # required for the built-in BERT trainer's Parquet read
  # Mount the PVC where elt-orders-pipeline wrote its Parquet output.
  # The controller mounts it read-only at /data.
  datasetPVC: articles-processed-pvc
  resourceHint:
    costPerHourUSD: "0.20"
  spot:
    enabled: false
    maxRetries: 2
  checkpoint:
    enabled: false
  # Controller-supplied training script — see Go: bertClassifierScript.
  # Defaults to distilbert-base-uncased on CPU, ModernBERT-base on GPU.
  builtinTrainer: BERTClassifier
  env:
    - { name: PYTHONUNBUFFERED,             value: "1" }
    - { name: TRANSFORMERS_VERBOSITY,       value: "error" }
    - { name: TORCH_DISTRIBUTED_DEFAULT_BACKEND, value: "gloo" }
    # Built-in trainer hyperparams (all optional; defaults in builtin_trainer_bert.go).
    - { name: TEXT_COLUMN,        value: "title" }
    - { name: LABEL_COLUMN,       value: "source" }
    - { name: DATA_PARQUET_GLOB,  value: "/data/published_date=*/*.parquet" }
    # Override the auto-selected model if you want; otherwise omit.
    # - { name: BERT_MODEL,       value: "distilbert-base-uncased" }
