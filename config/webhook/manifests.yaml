---
apiVersion: admissionregistration.k8s.io/v1
kind: ValidatingWebhookConfiguration
metadata:
  name: validating-webhook-configuration
webhooks:
- admissionReviewVersions:
  - v1
  clientConfig:
    service:
      name: webhook-service
      namespace: system
      path: /validate-compute-compute-example-com-v1alpha1-sparkjob
  failurePolicy: Fail
  name: vsparkjob-v1alpha1.kb.io
  rules:
  - apiGroups:
    - compute.compute.example.com
    apiVersions:
    - v1alpha1
    operations:
    - CREATE
    - UPDATE
    resources:
    - sparkjobs
  sideEffects: None
- admissionReviewVersions:
  - v1
  clientConfig:
    service:
      name: webhook-service
      namespace: system
      path: /validate-compute-compute-example-com-v1alpha1-trainingrun
  failurePolicy: Fail
  name: vtrainingrun-v1alpha1.kb.io
  rules:
  - apiGroups:
    - compute.compute.example.com
    apiVersions:
    - v1alpha1
    operations:
    - CREATE
    - UPDATE
    resources:
    - trainingruns
  sideEffects: None
